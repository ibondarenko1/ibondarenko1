name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: General overview card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ibondarenko1
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          config_padding: 0, 8 + 11%
          plugin_languages: yes
          plugin_languages_ignored: html, css, smarty, tex, jupyter notebook
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          plugin_notable_types: commit, issue, pull_request, review
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_lines: yes
          plugin_lines_history_limit: 1

      - name: Achievements card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ibondarenko1
          filename: github-metrics-achievements.svg
          base: ""
          config_timezone: America/Los_Angeles
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          plugin_achievements_ignored: octonaut

      - name: Isocalendar (commit heatmap)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ibondarenko1
          filename: github-metrics-isocalendar.svg
          base: ""
          config_timezone: America/Los_Angeles
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
